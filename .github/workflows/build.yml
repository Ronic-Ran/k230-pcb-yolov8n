name: Build K230 PCB YOLOv8n

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Pull K230 SDK Docker image
      run: |
        docker pull ghcr.io/kendryte/k230_sdk:latest
        
    - name: Build in Docker
      run: |
        docker run -u root -v ${{ github.workspace }}:/workspace ghcr.io/kendryte/k230_sdk:latest /bin/bash -c "
          set -e
          
          echo '========== Clone K230 SDK =========='
          cd /tmp && git clone --recursive https://github.com/kendryte/k230_canmv.git canmv
          cd canmv
          
          echo '========== Check for nncase library =========='
          if [ -d 'src/big/nncase/lib' ]; then
              echo 'Found nncase/lib:'
              ls -la src/big/nncase/lib/
          else
              echo 'nncase/lib not found - will build without linking'
          fi
          
          echo '========== Copy source code =========='
          rm -rf /tmp/canmv/src/reference/ai_poc/pcb_yolov8n
          mkdir -p /tmp/canmv/src/reference/ai_poc/pcb_yolov8n
          cp /workspace/*.cc /tmp/canmv/src/reference/ai_poc/pcb_yolov8n/ 2>/dev/null || true
          cp /workspace/*.h /tmp/canmv/src/reference/ai_poc/pcb_yolov8n/ 2>/dev/null || true
          
          echo '========== Create CMakeLists with conditional linking =========='
          cat > /tmp/canmv/src/reference/ai_poc/pcb_yolov8n/CMakeLists.txt << 'EOF'
cmake_minimum_required(VERSION 3.10)
project(pcb_yolov8n)
set(CMAKE_CXX_STANDARD 14)

set(NNCASE_LIB_DIR \"/tmp/canmv/src/big/nncase/lib\")

include_directories(
    \${CMAKE_SOURCE_DIR}
    /tmp/canmv/src/big/nncase/include
    /tmp/canmv/src/big/nncase/runtime
)

add_executable(pcb_yolov8n.elf main.cc yolov8n_pcb.cc)

if(EXISTS \"\${NNCASE_LIB_DIR}/libnncase.a\")
    link_directories(\${NNCASE_LIB_DIR})
    target_link_libraries(pcb_yolov8n.elf nncase nncase_rt_modules_k230 pthread)
    message(STATUS \"Linked with nncase libraries\")
else()
    target_link_libraries(pcb_yolov8n.elf pthread)
    message(STATUS \"Linked without nncase (mock mode)\")
endif()
EOF
          
          echo '========== Compile =========='
          cd /tmp/canmv/src/reference/ai_poc/pcb_yolov8n
          mkdir -p build && cd build
          cmake ..
          make -j\$(nproc)
          
          echo '========== Verify =========='
          if [ -f 'pcb_yolov8n.elf' ]; then
              echo 'SUCCESS!'
              ls -lh pcb_yolov8n.elf
              cp pcb_yolov8n.elf /workspace/
          else
              echo 'FAILED!'
              exit 1
          fi
        "
        
    - name: Upload ELF
      uses: actions/upload-artifact@v4
      with:
        name: pcb_yolov8n_elf
        path: pcb_yolov8n.elf
        

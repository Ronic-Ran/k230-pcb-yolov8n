name: Build K230 PCB YOLOv8n

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Pull K230 SDK Docker image
      run: |
        docker pull ghcr.io/kendryte/k230_sdk:latest
        
    - name: Build in Docker
      run: |
        docker run -u root -v ${{ github.workspace }}:/workspace ghcr.io/kendryte/k230_sdk:latest /bin/bash -c "
          set -e
          
          echo '========== Clone K230 SDK =========='
          cd /tmp && git clone --recursive https://github.com/kendryte/k230_canmv.git canmv
          cd canmv && git submodule update --init --recursive || true
          
          echo '========== Check nncase libraries =========='
          if [ -d 'src/big/nncase/lib' ]; then
              echo 'Found nncase lib directory:'
              ls -la src/big/nncase/lib/ || true
          else
              echo 'Building nncase from source...'
              if [ -f 'src/big/nncase/CMakeLists.txt' ]; then
                  mkdir -p src/big/nncase/build
                  cd src/big/nncase/build
                  cmake .. -DCMAKE_BUILD_TYPE=Release
                  make -j\$(nproc)
                  cd /tmp/canmv
              fi
          fi
          
          echo '========== Copy source code =========='
          rm -rf /tmp/canmv/src/reference/ai_poc/pcb_yolov8n
          mkdir -p /tmp/canmv/src/reference/ai_poc/pcb_yolov8n
          cp /workspace/*.cc /tmp/canmv/src/reference/ai_poc/pcb_yolov8n/ || true
          cp /workspace/*.h /tmp/canmv/src/reference/ai_poc/pcb_yolov8n/ || true
          cp /workspace/CMakeLists.txt /tmp/canmv/src/reference/ai_poc/pcb_yolov8n/
          
          echo 'Copied files:'
          ls -la /tmp/canmv/src/reference/ai_poc/pcb_yolov8n/
          
          echo '========== Compile project =========='
          cd /tmp/canmv/src/reference/ai_poc/pcb_yolov8n
          mkdir -p build && cd build
          cmake -DK230_SDK=/tmp/canmv ..
          make -j\$(nproc)
          
          echo '========== Verify output =========='
          if [ -f 'pcb_yolov8n.elf' ]; then
              echo 'Build successful!'
              ls -lh pcb_yolov8n.elf
          else
              echo 'ERROR: pcb_yolov8n.elf not found!'
              exit 1
          fi
          
          cp pcb_yolov8n.elf /workspace/
        "
        
    - name: Upload ELF
      uses: actions/upload-artifact@v4
      with:
        name: pcb_yolov8n_elf
        path: pcb_yolov8n.elf

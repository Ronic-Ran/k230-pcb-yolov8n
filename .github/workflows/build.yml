name: Build K230 PCB YOLOv8n

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git cmake build-essential wget python3 python3-pip libssl-dev
        
    - name: Clone K230 CanMV SDK
      run: |
        cd /tmp
        git clone --recursive https://github.com/kendryte/k230_canmv.git canmv
        cd canmv
        git submodule update --init --recursive || true
        
    - name: Copy PCB detection code
      run: |
        rm -rf /tmp/canmv/src/reference/ai_poc/pcb_yolov8n
        mkdir -p /tmp/canmv/src/reference/ai_poc/pcb_yolov8n
        cp -r $GITHUB_WORKSPACE/* /tmp/canmv/src/reference/ai_poc/pcb_yolov8n/
        
    - name: Build application
      run: |
        cd /tmp/canmv/src/reference/ai_poc/pcb_yolov8n
        if [ -f build_app.sh ]; then
          chmod +x build_app.sh
          ./build_app.sh
        else
          mkdir -p build && cd build
          cmake ..
          make -j4
        fi
        
    - name: Upload ELF
      uses: actions/upload-artifact@v4
      with:
        name: pcb_yolov8n_elf
        path: /tmp/canmv/src/reference/ai_poc/pcb_yolov8n/build/pcb_yolov8n.elf
